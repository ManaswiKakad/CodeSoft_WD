<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern To-Do App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    padding:30px;
}

.container{
    width:100%;
    max-width:850px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    color:white;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.controls{
    display:grid;
    grid-template-columns:2fr 1fr 1fr 1fr auto;
    gap:10px;
    margin-bottom:20px;
}

input, select{
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
}

button{
    border:none;
    border-radius:10px;
    padding:12px;
    cursor:pointer;
    font-weight:bold;
}

.add-btn{
    background:#00c853;
    color:white;
}

.search-box{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border:none;
    border-radius:10px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    margin-bottom:20px;
}

.card{
    background:rgba(255,255,255,0.2);
    padding:15px;
    text-align:center;
    border-radius:15px;
}

.progress-container{
    width:100%;
    height:12px;
    background:rgba(255,255,255,0.3);
    border-radius:20px;
    overflow:hidden;
    margin-bottom:20px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#00e676;
    transition:0.4s;
}

.task{
    background:white;
    color:#333;
    padding:15px;
    margin-bottom:15px;
    border-radius:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    animation:slideIn .4s ease;
}

.task.completed{
    opacity:0.7;
}

.task.completed .task-title{
    text-decoration:line-through;
}

.task-info{
    flex:1;
}

.task-title{
    font-size:18px;
    font-weight:bold;
}

.task-date{
    color:#666;
    margin-top:5px;
    font-size:14px;
}

.priority{
    display:inline-block;
    padding:5px 10px;
    border-radius:20px;
    color:white;
    font-size:12px;
    margin-top:8px;
}

.high{background:#f44336;}
.medium{background:#ff9800;}
.low{background:#4caf50;}

.actions{
    display:flex;
    gap:8px;
}

.complete-btn{
    background:#2196f3;
    color:white;
}

.edit-btn{
    background:#ff9800;
    color:white;
}

.delete-btn{
    background:#f44336;
    color:white;
}

@keyframes slideIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:768px){
    .controls{
        grid-template-columns:1fr;
    }

    .stats{
        grid-template-columns:1fr;
    }

    .task{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
    }
}
</style>
</head>
<body>

<div class="container">

    <h1>📝 Modern To-Do App</h1>

    <input
        type="text"
        id="search"
        class="search-box"
        placeholder="🔍 Search Tasks..."
        onkeyup="displayTasks()"
    >

    <div class="controls">
        <input type="text" id="taskInput" placeholder="Enter Task">
        <input type="datetime-local" id="taskDate">
        
        <select id="priority">
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
        </select>

        <button class="add-btn" onclick="addTask()">Add</button>
    </div>

    <div class="stats">
        <div class="card">
            <h2 id="totalTasks">0</h2>
            <p>Total Tasks</p>
        </div>

        <div class="card">
            <h2 id="completedTasks">0</h2>
            <p>Completed</p>
        </div>

        <div class="card">
            <h2 id="pendingTasks">0</h2>
            <p>Pending</p>
        </div>
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div id="taskList"></div>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks(){
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask(){
    const text = document.getElementById("taskInput").value.trim();
    const date = document.getElementById("taskDate").value;
    const priority = document.getElementById("priority").value;

    if(text === ""){
        alert("Please enter a task");
        return;
    }

    tasks.push({
        id: Date.now(),
        text,
        date,
        priority,
        completed:false
    });

    saveTasks();
    displayTasks();

    document.getElementById("taskInput").value="";
    document.getElementById("taskDate").value="";
}

function displayTasks(){

    const taskList = document.getElementById("taskList");
    const search = document.getElementById("search").value.toLowerCase();

    taskList.innerHTML = "";

    const filteredTasks = tasks.filter(task =>
        task.text.toLowerCase().includes(search)
    );

    filteredTasks.forEach(task => {

        const div = document.createElement("div");

        div.className = task.completed
            ? "task completed"
            : "task";

        div.innerHTML = `
            <div class="task-info">
                <div class="task-title">${task.text}</div>

                <div class="task-date">
                    📅 ${task.date || "No Date"}
                </div>

                <span class="priority ${task.priority.toLowerCase()}">
                    ${task.priority}
                </span>
            </div>

            <div class="actions">
                <button class="complete-btn"
                onclick="toggleTask(${task.id})">
                ${task.completed ? "Undo" : "Done"}
                </button>

                <button class="edit-btn"
                onclick="editTask(${task.id})">
                Edit
                </button>

                <button class="delete-btn"
                onclick="deleteTask(${task.id})">
                Delete
                </button>
            </div>
        `;

        taskList.appendChild(div);
    });

    updateStats();
}

function toggleTask(id){
    tasks = tasks.map(task=>{
        if(task.id === id){
            task.completed = !task.completed;
        }
        return task;
    });

    saveTasks();
    displayTasks();
}

function editTask(id){

    const task = tasks.find(t => t.id === id);

    const newText = prompt("Edit Task", task.text);

    if(newText && newText.trim() !== ""){
        task.text = newText;
    }

    saveTasks();
    displayTasks();
}

function deleteTask(id){

    if(confirm("Delete this task?")){
        tasks = tasks.filter(task => task.id !== id);

        saveTasks();
        displayTasks();
    }
}

function updateStats(){

    const total = tasks.length;
    const completed = tasks.filter(t => t.completed).length;
    const pending = total - completed;

    document.getElementById("totalTasks").textContent = total;
    document.getElementById("completedTasks").textContent = completed;
    document.getElementById("pendingTasks").textContent = pending;

    const percentage =
        total === 0 ? 0 : (completed / total) * 100;

    document.getElementById("progressBar").style.width =
        percentage + "%";
}

displayTasks();
</script>

</body>
</html>
